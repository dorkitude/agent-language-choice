<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>D&D REST Benchmark Dashboard</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <header class="topbar">
      <div class="brand">
        <div class="mark" aria-hidden="true">d20</div>
        <div>
          <h1>D&D REST Benchmark</h1>
          <p id="generatedAt">Loading benchmark JSON...</p>
        </div>
      </div>
      <div class="actions">
        <button id="refreshButton" type="button" title="Reload dashboard JSON">Refresh</button>
      </div>
    </header>

    <main>
      <section class="summary-grid" id="summaryGrid"></section>

      <section class="controls" aria-label="Filters">
        <label>
          <span>Mode</span>
          <select id="modeFilter">
            <option value="lifecycle">Lifecycle</option>
            <option value="flat">Flat</option>
          </select>
        </label>
        <label>
          <span>Model</span>
          <select id="modelFilter"></select>
        </label>
        <label>
          <span>Target</span>
          <select id="targetFilter"></select>
        </label>
        <label>
          <span>Status</span>
          <select id="statusFilter">
            <option value="all">All</option>
            <option value="pass">Pass</option>
            <option value="fail">Fail</option>
            <option value="partial">Partial</option>
          </select>
        </label>
        <label class="search">
          <span>Search</span>
          <input id="searchInput" type="search" placeholder="model, target, failure, prompt text" />
        </label>
      </section>

      <section class="layout">
        <div class="panel matrix-panel">
          <div class="panel-head">
            <h2>Matrix</h2>
            <p id="matrixCaption"></p>
          </div>
          <div id="matrix" class="matrix"></div>
        </div>

        <aside class="panel analytics-panel">
          <div class="panel-head">
            <h2>Analytics</h2>
            <p>Pass rate, shot burden, and failure concentration.</p>
          </div>
          <div id="analytics" class="analytics"></div>
        </aside>
      </section>

      <section class="panel detail-panel">
        <div class="panel-head detail-head">
          <div>
            <h2 id="detailTitle">Select a matrix cell</h2>
            <p id="detailSubtitle">Choose a run to inspect prompts, model output, evaluator failures, and logs.</p>
          </div>
          <div id="detailBadges" class="badges"></div>
        </div>

        <div id="detailEmpty" class="empty-state">
          <strong>No run selected.</strong>
          <span>Pick a cell in the matrix or a row in analytics.</span>
        </div>

        <div id="detailContent" class="detail-content hidden">
          <div id="shotRail" class="shot-rail"></div>
          <div class="artifact-tabs" id="artifactTabs"></div>
          <pre id="artifactViewer" class="artifact-viewer"></pre>
        </div>
      </section>
    </main>

    <script src="./app.js"></script>
  </body>
</html>
